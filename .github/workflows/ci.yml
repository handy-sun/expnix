name: CI

on:
  push:
    branches: [main, "dev*"]
    paths-ignore:
      - "**.md"
      - Justfile
      - .gitignore
      - LICENSE
  pull_request:
    branches: [main, "dev*"]
    paths-ignore:
      - "**.md"
      - Justfile
      - .gitignore
      - LICENSE
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  flake-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14
      - uses: DeterminateSystems/magic-nix-cache-action@v8
        with:
          use-flakehub: false
      - run: nix flake check
      - run: nix shell nixpkgs#statix -c sh -c 'statix check . 2>&1 | tee /dev/stderr | grep -q "^\[E" && exit 1 || exit 0'

  build:
    needs: flake-check
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: expnix (aarch64-linux)
            os: ubuntu-24.04-arm
            attr: nixosConfigurations.expnix.config.system.build.toplevel
          - name: nixwsl (x86_64-linux)
            os: ubuntu-latest
            attr: nixosConfigurations.nixwsl.config.system.build.toplevel
          - name: buking (x86_64-linux)
            os: ubuntu-latest
            attr: nixosConfigurations.buking.config.system.build.toplevel
          - name: reinsvps (x86_64-linux)
            os: ubuntu-latest
            attr: nixosConfigurations.reinsvps.config.system.build.toplevel
          - name: handyMini (aarch64-darwin)
            os: macos-14
            attr: darwinConfigurations.handyMini.config.system.build.toplevel
          - name: home (x86_64-linux)
            os: ubuntu-latest
            attr: homeConfigurations.qi.activationPackage
    name: build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14
      - uses: DeterminateSystems/magic-nix-cache-action@v8
        with:
          use-flakehub: false
      - run: nix build .#${{ matrix.attr }} --dry-run --quiet
