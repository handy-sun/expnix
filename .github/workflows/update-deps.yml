name: Update dependencies

on:
  schedule:
    - cron: "0 3 * * 6"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: DeterminateSystems/nix-installer-action@v14
      - uses: DeterminateSystems/magic-nix-cache-action@v8
        with:
          use-flakehub: false

      - name: Update flake inputs
        id: update
        run: |
          nix flake update

          if git diff --quiet -- flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "flake.lock unchanged"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "flake.lock updated"
          fi

      - name: Verify updated flake
        if: steps.update.outputs.changed == 'true'
        run: nix flake check --no-build --print-build-logs

      - name: Create pull request
        if: steps.update.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH_NAME: automation/update-flake-inputs
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git fetch origin "$BRANCH_NAME:refs/remotes/origin/$BRANCH_NAME" || true
          git switch -c "$BRANCH_NAME"
          git add flake.lock
          git commit -m "chore: update flake inputs"
          git push --force-with-lease origin "HEAD:$BRANCH_NAME"

          cat > /tmp/update-flake-inputs-pr-body.md <<'EOF'
          Automated flake.lock update.

          Verification:
          - nix flake check --no-build --print-build-logs
          EOF

          pr_number="$(gh pr list --head "$BRANCH_NAME" --state open --json number --jq '.[0].number // empty')"
          if [ -n "$pr_number" ]; then
            echo "Updated existing pull request #$pr_number"
          else
            gh pr create \
              --base "${{ github.event.repository.default_branch }}" \
              --head "$BRANCH_NAME" \
              --title "chore: update flake inputs" \
              --body-file /tmp/update-flake-inputs-pr-body.md
          fi
