name: Update dependencies

on:
  # schedule:
  #   - cron: "0 3 * * 6"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: DeterminateSystems/nix-installer-action@v14
      - uses: DeterminateSystems/magic-nix-cache-action@v8
        with:
          use-flakehub: false

      - name: Update flake inputs
        id: update
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          before_rev="$(git rev-parse HEAD)"
          nix flake update --commit-lock-file nixpkgs nix-darwin nixos-wsl home-manager system-manager helix-dev
          after_rev="$(git rev-parse HEAD)"

          if [ "$before_rev" = "$after_rev" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "flake.lock unchanged"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "flake.lock updated"
          fi

      - name: Push updates
        if: steps.update.outputs.changed == 'true'
        env:
          BRANCH_NAME: automation/update-flake-inputs
        run: |
          git fetch origin "$BRANCH_NAME:refs/remotes/origin/$BRANCH_NAME" || true
          git switch -c "$BRANCH_NAME"
          git push --force-with-lease origin "HEAD:$BRANCH_NAME"
