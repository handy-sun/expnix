name: Build cache

on:
  schedule:
    - cron: "0 3,15 * * *"
  workflow_dispatch:

concurrency:
  group: build-cache
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.compare.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - name: Hash current flake.lock
        run: sha256sum flake.lock > /tmp/flake-lock-hash

      - name: Restore last build hash
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/last-hash
          key: build-cache-flake-lock

      - name: Compare hashes
        id: compare
        run: |
          if [ -f /tmp/last-hash ] && diff -q /tmp/flake-lock-hash /tmp/last-hash > /dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "flake.lock unchanged, skipping build"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "flake.lock changed, will rebuild"
          fi

  build:
    needs: check-changes
    if: needs.check-changes.outputs.should_build == 'true'
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: orbvmnix (aarch64-linux)
            os: ubuntu-24.04-arm
            attr: nixosConfigurations.orbvmnix.config.system.build.toplevel
          - name: nixwsl (x86_64-linux)
            os: ubuntu-latest
            attr: nixosConfigurations.nixwsl.config.system.build.toplevel
          - name: handyMini (aarch64-darwin)
            os: macos-14
            attr: darwinConfigurations.handyMini.config.system.build.toplevel
          - name: home (x86_64-linux)
            os: ubuntu-latest
            attr: homeConfigurations.qi.activationPackage
    name: build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14
      - uses: DeterminateSystems/magic-nix-cache-action@v8
        with:
          use-flakehub: false
      - run: nix build .#${{ matrix.attr }}

  save-hash:
    needs: [check-changes, build]
    if: needs.check-changes.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sha256sum flake.lock > /tmp/flake-lock-hash
      - uses: actions/cache/save@v4
        with:
          path: /tmp/flake-lock-hash
          key: build-cache-flake-lock
