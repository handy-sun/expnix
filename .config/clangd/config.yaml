CompileFlags:
  Add: [
    # -I${HOME}/.local/include/,
    -xc++,
    -std=gnu++11,
    -Wno-c++98-compat,
    -Wno-unused-value,
    -Wno-nonportable-include-path,
  ]
  Compiler: g++
  # CompilationDatabase: build/       # Search build/ directory for compile_commands.json
Diagnostics:
  UnusedIncludes: None # ignore unused includes
  Suppress: attributes_not_allowed
